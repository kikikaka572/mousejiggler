<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playbbit - 토끼 점프 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🐰 Playbbit</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">Score:</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">High Score:</span>
                    <span class="value" id="highScore">0</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-controls">
            <p class="instruction">← → 또는 A, D 로 이동 | SPACE 로 점프</p>
            <button id="startBtn" class="btn btn-primary">게임 시작</button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>일시정지</button>
        </div>
        
        <div id="gameOverScreen" class="modal hidden">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button id="restartBtn" class="btn btn-primary">다시 시작</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
