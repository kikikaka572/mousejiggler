<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마우스 지글러</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scanline"></div>

  <div class="container">
    <div class="header">
      <div class="header-label">// SYSTEM UTILITY</div>
      <h1>마우스 <span>지글러</span></h1>
    </div>

    <div class="card" id="card">
      <div class="status-row">
        <div class="status-badge">
          <div class="dot" id="dot"></div>
          <span class="status-text" id="statusText">대기 중</span>
        </div>
        <div class="uptime" id="uptime">00:00:00</div>
      </div>

      <div class="toggle-wrap">
        <button class="toggle-btn" id="mainBtn" title="클릭하여 시작/정지 (Space)"></button>
      </div>

      <div class="settings">
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-label">작동 간격</div>
            <div class="setting-sub">마우스 이동 주기</div>
          </div>
          <div class="interval-wrap">
            <input type="range" id="intervalSlider" min="10" max="60" value="30" step="5">
            <div class="interval-val" id="intervalVal">30초</div>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-label">비가시 모드</div>
            <div class="setting-sub">최소 픽셀로 이동 (권장)</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="stealthMode" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-label">Wake Lock</div>
            <div class="setting-sub">화면 절전 방지 (지원 시)</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="wakeLock">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="log-wrap">
        <div class="log-title">ACTIVITY LOG</div>
        <div class="log-entries" id="logEntries">
          <div class="log-entry">— 대기 중...</div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      브라우저에서 실행 · 설치 불필요<br>
      <strong>Chrome / Edge</strong> 전체화면으로 사용 시 최적
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
